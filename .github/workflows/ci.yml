name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
      continue-on-error: false
    
    - name: Build project
      run: npm run build
      env:
        NODE_OPTIONS: "--max_old_space_size=4096"
