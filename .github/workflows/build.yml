name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - run: npm install --legacy-peer-deps
    
    - run: npm run build
      env:
        CI: false
        DISABLE_ESLINT_PLUGIN: true
        TSC_COMPILE_ON_ERROR: true
        SKIP_PREFLIGHT_CHECK: true
